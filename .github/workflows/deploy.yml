name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main # Або master, залежно від вашої основної гілки

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Дозвіл для peaceiris/actions-gh-pages для пушу в гілку gh-pages
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build # Це виконає next build && next export

      - name: Add .nojekyll file
        run: touch ./out/.nojekyll # GitHub Pages ігноруватиме Jekyll

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          # Якщо ви НЕ використовуєте файл public/CNAME, можете розкоментувати наступний рядок:
          # cname: yourcustomdomain.com
